<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ledgerline — Admin Review</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--one" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--two" aria-hidden="true"></div>

    <div id="adminAuthGate" class="admin-gate" hidden>
      <div class="admin-gate-card">
        <div class="brand">
          <img src="assets/logo.png" alt="LedgerLine" class="brand-logo brand-logo--sm">
        </div>
        <p class="admin-gate-msg" id="adminGateMsg">Checking access…</p>
        <a href="index.html" class="link-btn">← Back to employee view</a>
      </div>
    </div>

    <div id="adminShell" class="admin-shell" hidden>
      <header class="admin-header">
        <div class="brand">
          <img src="assets/logo.png" alt="LedgerLine" class="brand-logo brand-logo--sm">
        </div>
        <div class="admin-header-center">
          <span class="admin-badge">Admin review console</span>
        </div>
        <div class="admin-header-right">
          <div class="user-chip">
            <span class="user-avatar" id="adminAvatar">·</span>
            <span class="user-meta">
              <span class="user-name" id="adminName">—</span>
              <span class="user-email" id="adminEmail">—</span>
            </span>
          </div>
          <button class="icon-btn" id="adminSignOutBtn" title="Sign out">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path
                d="M6 14H3.5A1.5 1.5 0 0 1 2 12.5v-9A1.5 1.5 0 0 1 3.5 2H6M10.5 11.5L14 8l-3.5-3.5M14 8H6"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
      </header>

      <main class="admin-main">
        <div class="stats-bar">
          <div class="stat-card">
            <span class="stat-value" id="statPending">0</span>
            <span class="stat-label">Pending review</span>
          </div>
          <div class="stat-card">
            <span class="stat-value stat-value--approved" id="statApproved"
              >0</span
            >
            <span class="stat-label">Approved today</span>
          </div>
          <div class="stat-card">
            <span class="stat-value stat-value--rejected" id="statRejected"
              >0</span
            >
            <span class="stat-label">Rejected today</span>
          </div>
        </div>

        <section class="review-section">
          <div class="section-head">
            <h2>Pending approvals</h2>
            <span class="status-pill"
              ><span class="status-dot"></span>Live queue</span
            >
          </div>

          <div id="pendingEmpty" class="queue-empty">
            <div class="empty-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                <path
                  d="M4 12L9 17L20 6"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </div>
            <h3>All clear</h3>
            <p>No expenses are waiting for review right now.</p>
          </div>

          <div id="pendingQueue" class="expense-queue"></div>
        </section>

        <section class="review-section">
          <div class="section-head">
            <h2>Recent decisions</h2>
          </div>
          <div id="resolvedEmpty" class="queue-empty" style="display: none">
            <p>No decisions recorded yet.</p>
          </div>
          <div
            id="resolvedQueue"
            class="expense-queue expense-queue--resolved"
          ></div>
        </section>
      </main>
    </div>

    <div id="toastStack" class="toast-stack" aria-live="polite"></div>

    <div id="confirmModal" class="modal-backdrop" hidden>
      <div class="modal-card">
        <h3 id="modalTitle">Confirm decision</h3>
        <p id="modalBody">Are you sure?</p>
        <div class="modal-actions">
          <button class="btn btn--ghost" id="modalCancel">Cancel</button>
          <button class="btn btn--primary" id="modalConfirm">Confirm</button>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
